name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build
        run: bash build_app.sh
      - uses: actions/upload-artifact@v4
        with:
          name: drivelog-apk
          path: out/drivelog.apk
